<!DOCTYPE html>
<html>
<head>
    <title>Vertical Frames</title>
</head>

<body>

    <!-- Top Frame (Red) -->
    <iframe srcdoc="
        <body style='background-color:red; color:white; text-align:center;'>
            <h2>Top Frame - Red</h2>
        </body>
    " width="100%" height="200"></iframe>

    <!-- Middle Frame (Green) -->
    <iframe srcdoc="
        <body style='background-color:green; color:white; text-align:center;'>

        </body>
    " width="100%" height="200"></iframe>

    <!-- Bottom Frame (Blue) -->
    <iframe srcdoc="
        <body style='background-color:blue; color:white; text-align:center;'>
            <h2>Bottom Frame - Blue</h2>
        </body>
    " width="100%" height="200"></iframe>

</html>
